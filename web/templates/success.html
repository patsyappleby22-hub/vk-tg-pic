<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла успешно</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(74,222,128,0.3);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            max-width: 460px;
        }
        .icon { font-size: 4em; margin-bottom: 20px; }
        h1 { font-size: 1.8em; margin-bottom: 12px; color: #4ade80; }
        p { color: #b0b0d0; font-size: 1.05em; line-height: 1.6; margin-bottom: 12px; }
        .info { color: #9090b0; font-size: 0.9em; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Оплата прошла успешно!</h1>
        <p>Кредиты начислены на ваш аккаунт. Вернитесь в бота и продолжайте генерировать изображения.</p>
        <p class="info">Если кредиты не появились — напишите в бот команду /start</p>
    </div>
</body>
</html>
